name: Auto Sync with Source

on:
  # schedule:
    # Every 15 minutes between 9:00 AM and 5:45 PM local time (7:00 AM - 3:45 PM UTC)
    # - cron: '*/15 7-15 * * *'
    # Every hour between 6:00 PM and 8:00 AM local time (4:00 PM - 6:00 AM UTC)
    # - cron: '0 16-23,0-6 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Merge Source
        run: |
          # Add the source repository as a remote
          git remote add source-repo https://${{ secrets.SYNC_TOKEN }}@github.com/rraymaekers/Wealtheon-Website.git
          
          # Fetch the latest changes from the source
          git fetch source-repo
          
          # Ensure you are on the main branch (change 'main' to 'master' below if your default branch is master)
          git checkout main 
          
          # Merge the source main branch into your target main branch
          git merge source-repo/main --no-edit
          
          # Push the synced changes to your target repo
          git push origin main
