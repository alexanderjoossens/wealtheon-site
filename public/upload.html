<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealtheon — Image Manager</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--bg-light); min-height: 100vh; }

    .upload-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .upload-header .logo-text { font-size: 1.3rem; font-weight: 700; color: var(--black); }
    .upload-header .logo-text span { color: var(--red); }
    .upload-header h1 { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-left: 8px; border-left: 1px solid var(--border); padding-left: 16px; }

    .upload-wrap { max-width: 900px; margin: 40px auto; padding: 0 24px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      background: var(--white);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone.dragover { border-color: var(--red); background: var(--red-light); }
    .drop-zone p { color: var(--text-muted); margin-top: 8px; font-size: .95rem; }
    .drop-zone .icon { font-size: 2.5rem; }
    .drop-zone input[type=file] { display: none; }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: var(--red-dark); }
    .btn:disabled { opacity: .5; cursor: default; }

    /* Status */
    #status { margin-top: 16px; font-size: .9rem; color: var(--text-muted); min-height: 20px; }
    #status.error { color: var(--red); }
    #status.success { color: #1a7a3c; }

    /* Gallery */
    .gallery-title {
      margin: 40px 0 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--black);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .gallery-item img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
    }
    .gallery-item-info {
      padding: 8px 10px;
      font-size: .78rem;
      color: var(--text-muted);
    }
    .gallery-item-info .fname {
      font-weight: 600;
      color: var(--black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gallery-item-actions {
      padding: 0 10px 10px;
      display: flex;
      gap: 6px;
    }
    .btn-copy, .btn-delete {
      flex: 1;
      padding: 5px 0;
      font-size: .78rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .btn-copy { background: var(--bg-light); color: var(--black); }
    .btn-copy:hover { background: var(--border); }
    .btn-delete { background: #fff0f0; color: var(--red); }
    .btn-delete:hover { background: #ffe0e0; }

    .gallery-empty { color: var(--text-muted); font-size: .95rem; }
  </style>
</head>
<body>

  <header class="upload-header">
    <img src="/uploads/Wealtheon_logo_rgb.png" alt="Wealtheon" style="height:36px;width:auto;" />
    <h1>Image Manager</h1>
  </header>

  <div class="upload-wrap">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <div class="icon">🖼️</div>
      <p><strong>Drag &amp; drop images here</strong><br>or click to browse</p>
      <p style="font-size:.8rem;margin-top:4px;">JPG, PNG, GIF, WebP, SVG — max 10 MB each</p>
      <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.svg" />
      <button class="btn" id="browseBtn" type="button">Browse files</button>
    </div>

    <div id="status"></div>

    <!-- Gallery -->
    <div class="gallery-title">Uploaded Images</div>
    <div class="gallery" id="gallery">
      <p class="gallery-empty">Loading…</p>
    </div>

  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const statusEl = document.getElementById('status');
    const gallery  = document.getElementById('gallery');

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      uploadFiles(e.dataTransfer.files);
    });

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
    }

    async function uploadFiles(files) {
      if (!files || files.length === 0) return;
      const form = new FormData();
      for (const f of files) form.append('images', f);
      browseBtn.disabled = true;
      setStatus('Uploading…');
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        setStatus(`${data.uploaded.length} image(s) uploaded successfully.`, 'success');
        loadGallery();
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        browseBtn.disabled = false;
        fileInput.value = '';
      }
    }

    async function loadGallery() {
      try {
        const res = await fetch('/api/images');
        const data = await res.json();
        if (!data.images || data.images.length === 0) {
          gallery.innerHTML = '<p class="gallery-empty">No images uploaded yet.</p>';
          return;
        }
        gallery.innerHTML = data.images.map(img => `
          <div class="gallery-item" id="item-${CSS.escape(img.filename)}">
            <img src="${img.url}" alt="${img.filename}" loading="lazy" />
            <div class="gallery-item-info">
              <div class="fname" title="${img.filename}">${img.filename}</div>
              <div>${(img.size / 1024).toFixed(1)} KB</div>
            </div>
            <div class="gallery-item-actions">
              <button class="btn-copy" onclick="copyUrl('${img.url}')">Copy URL</button>
              <button class="btn-delete" onclick="deleteImage('${img.filename}')">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        gallery.innerHTML = '<p class="gallery-empty">Failed to load images.</p>';
      }
    }

    function copyUrl(url) {
      const full = window.location.origin + url;
      navigator.clipboard.writeText(full).then(() => setStatus('URL copied to clipboard!', 'success'));
    }

    async function deleteImage(filename) {
      if (!confirm(`Delete "${filename}"?`)) return;
      try {
        const res = await fetch('/api/images/' + encodeURIComponent(filename), { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        loadGallery();
        setStatus('Image deleted.', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    loadGallery();
  </script>

</body>
</html>
